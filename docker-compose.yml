services:
  wtyj-admin:
    build: .
    env_file:
      - .env
    ports:
      - "8010:8010"
    volumes:
      - ./data:/app/data
      # J3-BE-01: read-only mount of the tenant config root. Host path
      # configurable via NR3_TENANTS_CLIENT_HOST_DIR (default ./tenant_root
      # for local dev; VPS production uses /root/clients). Container
      # mount path matches NR3_TENANTS_CLIENT_DIR in .env.example so
      # list_tenants() can discover real client.json files at runtime.
      - ${NR3_TENANTS_CLIENT_HOST_DIR:-./tenant_root}:/app/tenant_root:ro
    restart: unless-stopped
